name: catch-n-match

services:
  # ---------- Postgres (Airflow Meta DB) ----------
  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # ---------- Airflow ----------
  airflow-init:
    build:
      context: ..
      dockerfile: docker/Dockerfile.python
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW_HOME=/opt/airflow
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DEFAULT_TIMEZONE=Asia/Seoul
      - TZ=Asia/Seoul                                    # 컨테이너 시스템 시간 → 로그 폴더명이 KST 날짜 기준으로 생성됨
      - AIRFLOW_CONN_GOOGLE_CLOUD_DEFAULT=google-cloud-platform://?key_path=%2Fopt%2Fairflow%2Fcredentials%2Fservice_account.json
      - GOOGLE_APPLICATION_CREDENTIALS=/opt/airflow/credentials/service_account.json
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - BQ_DATASET=${BQ_DATASET}
      - GCS_BUCKET=${GCS_BUCKET}
      - AIRFLOW_DEPLOY_DATETIME=${AIRFLOW_DEPLOY_DATETIME}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ../data/raw:/opt/airflow/data/raw
      - ../credentials:/opt/airflow/credentials
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@example.com --password admin || true
      "

  airflow-webserver:
    build:
      context: ..
      dockerfile: docker/Dockerfile.python
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW_HOME=/opt/airflow
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DEFAULT_TIMEZONE=Asia/Seoul
      - TZ=Asia/Seoul                                    # 컨테이너 시스템 시간 → 로그 폴더명이 KST 날짜 기준으로 생성됨
      - AIRFLOW_CONN_GOOGLE_CLOUD_DEFAULT=google-cloud-platform://?key_path=%2Fopt%2Fairflow%2Fcredentials%2Fservice_account.json
      - GOOGLE_APPLICATION_CREDENTIALS=/opt/airflow/credentials/service_account.json
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - BQ_DATASET=${BQ_DATASET}
      - GCS_BUCKET=${GCS_BUCKET}
      - AIRFLOW_DEPLOY_DATETIME=${AIRFLOW_DEPLOY_DATETIME}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ../data/raw:/opt/airflow/data/raw
      - ../credentials:/opt/airflow/credentials
    ports:
      - "8082:8080"
    command: airflow webserver

  airflow-scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.python
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW_HOME=/opt/airflow
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DEFAULT_TIMEZONE=Asia/Seoul
      - TZ=Asia/Seoul                                    # 컨테이너 시스템 시간 → 로그 폴더명이 KST 날짜 기준으로 생성됨
      - AIRFLOW_CONN_GOOGLE_CLOUD_DEFAULT=google-cloud-platform://?key_path=%2Fopt%2Fairflow%2Fcredentials%2Fservice_account.json
      - GOOGLE_APPLICATION_CREDENTIALS=/opt/airflow/credentials/service_account.json
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - BQ_DATASET=${BQ_DATASET}
      - GCS_BUCKET=${GCS_BUCKET}
      - AIRFLOW_DEPLOY_DATETIME=${AIRFLOW_DEPLOY_DATETIME}
    volumes:
      - ..:/app
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ../data/raw:/opt/airflow/data/raw
      - ../credentials:/opt/airflow/credentials
    command: airflow scheduler

volumes:
  postgres-db-volume:
